openapi: 3.0.3
info:
  title: Foxer Backend API
  description: REST API for the Foxer Paragliding platform — serves fApp (Flutter) and foxer-web (React admin)
  version: 0.2.0
  contact:
    name: Foxer Paragliding
    url: https://varjoliitokoulu.fi

servers:
  - url: http://localhost:3001/api
    description: Local development
  - url: https://api.foxerparagliding.fi/api
    description: Production (TBD)

tags:
  - name: Auth
  - name: Users
  - name: Courses
  - name: Lessons
  - name: Quizzes
  - name: Progress
  - name: Enrollments
  - name: Tracking
  - name: Products

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      properties:
        error: { type: string }
        message: { type: string }

    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        email: { type: string, format: email }
        role: { type: string, enum: [student, admin] }
        phone: { type: string, nullable: true }
        locale: { type: string, enum: [fi, en] }
        active: { type: boolean }
        last_login: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }

    Course:
      type: object
      properties:
        id: { type: string, example: pp1 }
        title: { type: string }
        title_en: { type: string, nullable: true }
        description: { type: string }
        days: { type: integer }
        hoursPerDay: { type: integer }
        published: { type: boolean }
        locale: { type: string, enum: [fi, en] }
        image_url: { type: string, nullable: true }

    CourseDay:
      type: object
      properties:
        id: { type: integer }
        course_id: { type: string }
        day_number: { type: integer }
        title: { type: string }
        description: { type: string }
        unlocked_after_day: { type: integer }

    Lesson:
      type: object
      properties:
        id: { type: string }
        course_day_id: { type: integer }
        title: { type: string }
        estimated_read_minutes: { type: integer }

    LessonWithSections:
      allOf:
        - $ref: '#/components/schemas/Lesson'
        - type: object
          properties:
            sections:
              type: array
              items: { $ref: '#/components/schemas/LessonSection' }

    LessonSection:
      type: object
      properties:
        id: { type: integer }
        heading: { type: string }
        body: { type: string }
        safety_flag: { type: boolean }
        sort_order: { type: integer }

    Quiz:
      type: object
      properties:
        id: { type: integer }
        lesson_id: { type: string }
        title: { type: string }
        questions:
          type: array
          items: { $ref: '#/components/schemas/QuizQuestion' }

    QuizQuestion:
      type: object
      properties:
        id: { type: integer }
        question: { type: string }
        options: { type: object, additionalProperties: { type: string } }

    QuizResult:
      type: object
      properties:
        score: { type: integer }
        total: { type: integer }
        passed: { type: boolean }
        correctAnswers: { type: object }

    Progress:
      type: object
      properties:
        userId: { type: integer }
        courses:
          type: array
          items:
            type: object
            properties:
              courseId: { type: string }
              progressPct: { type: integer }
              days:
                type: array
                items:
                  type: object
                  properties:
                    day: { type: integer }
                    readingDone: { type: boolean }
                    quizPassed: { type: boolean }
                    completedAt: { type: string, format: date-time, nullable: true }

    Enrollment:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        course_id: { type: string }
        course_dates: { type: string, nullable: true }
        enrolled_at: { type: string, format: date-time }
        email_sent: { type: boolean }

    UserAction:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        action_type: { type: string }
        course_id: { type: string, nullable: true }
        day_number: { type: integer, nullable: true }
        metadata: { type: object }
        created_at: { type: string, format: date-time }

    LocationSession:
      type: object
      properties:
        id: { type: integer }
        user_id: { type: integer }
        session_type: { type: string, enum: [flight, practice, ground] }
        started_at: { type: string, format: date-time }
        ended_at: { type: string, format: date-time, nullable: true }
        site_name: { type: string, nullable: true }

    LocationPoint:
      type: object
      properties:
        lat: { type: number }
        lng: { type: number }
        altitude: { type: number, nullable: true }
        accuracy: { type: number, nullable: true }
        speed: { type: number, nullable: true }
        heading: { type: number, nullable: true }
        recorded_at: { type: string, format: date-time }

    Product:
      type: object
      properties:
        id: { type: string }
        name: { type: string }
        short_desc: { type: string }
        category: { type: string }
        subcategory: { type: string }
        price: { type: number }
        sale_price: { type: number, nullable: true }
        manufacturer: { type: string }
        active: { type: boolean }

paths:
  # ── AUTH ──────────────────────────────────────────────────
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new student account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, email, password]
              properties:
                name: { type: string }
                email: { type: string, format: email }
                password: { type: string, minLength: 8 }
                locale: { type: string, enum: [fi, en] }
      responses:
        '201':
          description: Registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  refreshToken: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '409':
          description: Email already registered

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string }
                password: { type: string }
      responses:
        '200':
          description: Logged in
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  refreshToken: { type: string }
                  user: { $ref: '#/components/schemas/User' }
        '401':
          description: Invalid credentials

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken: { type: string }
      responses:
        '200':
          description: New token issued
        '401':
          description: Invalid or expired refresh token

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout (revoke refresh token)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                type: object
                properties:
                  message: { type: string, example: 'Logged out' }

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send password reset email
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string }
      responses:
        '200': { description: Reset email sent (always 200, no email enumeration) }

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token: { type: string }
                password: { type: string, minLength: 8 }
      responses:
        '200': { description: Password reset }
        '400': { description: Invalid or expired token }

  # ── USERS ─────────────────────────────────────────────────
  /users/me:
    get:
      tags: [Users]
      summary: Get own profile
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    put:
      tags: [Users]
      summary: Update own profile
      security: [{ bearerAuth: [] }]
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
                phone: { type: string }
                locale: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /users:
    get:
      tags: [Users]
      summary: List all users (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
        - in: query
          name: role
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: object
                properties:
                  users:
                    type: array
                    items: { $ref: '#/components/schemas/User' }
                  total: { type: integer }
                  page: { type: integer }

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID (admin or own)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
        '404': { description: Not found }
    put:
      tags: [Users]
      summary: Update user (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }
    delete:
      tags: [Users]
      summary: Deactivate user (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Deactivated }

  # ── COURSES ───────────────────────────────────────────────
  /courses:
    get:
      tags: [Courses]
      summary: List published courses
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Course' }
    post:
      tags: [Courses]
      summary: Create course (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Course' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Course' }

  /courses/{id}:
    get:
      tags: [Courses]
      summary: Get course detail
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Course' }
    put:
      tags: [Courses]
      summary: Update course (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Course' }
    delete:
      tags: [Courses]
      summary: Delete course (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deleted }

  /courses/{id}/days:
    get:
      tags: [Courses]
      summary: List days for course
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/CourseDay' }
    post:
      tags: [Courses]
      summary: Add day to course (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CourseDay' }

  /courses/{id}/days/{dayNum}:
    put:
      tags: [Courses]
      summary: Update course day (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: dayNum
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/CourseDay' }
    delete:
      tags: [Courses]
      summary: Remove day (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: dayNum
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Removed }

  # ── LESSONS ───────────────────────────────────────────────
  /lessons/{id}:
    get:
      tags: [Lessons]
      summary: Get lesson with sections (auth required)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LessonWithSections' }
        '401': { description: Unauthorized }
        '404': { description: Not found }
    put:
      tags: [Lessons]
      summary: Update lesson (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                title_en: { type: string }
                estimated_read_minutes: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lesson' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — admin only }
        '404': { description: Not found }
    delete:
      tags: [Lessons]
      summary: Delete lesson (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200': { description: Deleted }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — admin only }

  /lessons:
    post:
      tags: [Lessons]
      summary: Create lesson (admin)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [id, course_day_id]
              properties:
                id: { type: string }
                course_day_id: { type: integer }
                title: { type: string }
                title_en: { type: string }
                estimated_read_minutes: { type: integer }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Lesson' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — admin only }

  /lessons/{id}/sections:
    post:
      tags: [Lessons]
      summary: Add section to lesson (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                heading: { type: string }
                heading_en: { type: string }
                body: { type: string }
                body_en: { type: string }
                safety_flag: { type: boolean }
                sort_order: { type: integer }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LessonSection' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — admin only }

  /lessons/{id}/sections/{sectionId}:
    put:
      tags: [Lessons]
      summary: Update section (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: sectionId
          required: true
          schema: { type: integer }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                heading: { type: string }
                heading_en: { type: string }
                body: { type: string }
                body_en: { type: string }
                safety_flag: { type: boolean }
                sort_order: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LessonSection' }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — admin only }
    delete:
      tags: [Lessons]
      summary: Delete section (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
        - in: path
          name: sectionId
          required: true
          schema: { type: integer }
      responses:
        '200': { description: Removed }
        '401': { description: Unauthorized }
        '403': { description: Forbidden — admin only }

  # ── QUIZZES ───────────────────────────────────────────────
  /quizzes/{lessonId}:
    get:
      tags: [Quizzes]
      summary: Get quiz for lesson
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: lessonId
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Quiz' }

  /quizzes/{lessonId}/submit:
    post:
      tags: [Quizzes]
      summary: Submit quiz answers
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: lessonId
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                answers:
                  type: object
                  additionalProperties: { type: string }
                  example: { "1": "b", "2": "a", "3": "c" }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/QuizResult' }

  # ── PROGRESS ──────────────────────────────────────────────
  /progress:
    get:
      tags: [Progress]
      summary: Get own progress
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Progress' }

  /progress/reading:
    post:
      tags: [Progress]
      summary: Mark reading complete
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id, day_number]
              properties:
                course_id: { type: string }
                day_number: { type: integer }
      responses:
        '200': { description: Marked complete }

  /progress/day:
    post:
      tags: [Progress]
      summary: Mark day complete
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id, day_number]
              properties:
                course_id: { type: string }
                day_number: { type: integer }
      responses:
        '200': { description: Day marked complete }

  /progress/{userId}:
    get:
      tags: [Progress]
      summary: Get any user's progress (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Progress' }

  # ── ENROLLMENTS ───────────────────────────────────────────
  /enrollments:
    post:
      tags: [Enrollments]
      summary: Enroll in course (triggers welcome email)
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [course_id]
              properties:
                course_id: { type: string }
                course_dates: { type: string, example: "14–16.6.2026" }
                user_id: { type: integer, description: "Admin only — enroll another user" }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Enrollment' }
    get:
      tags: [Enrollments]
      summary: List all enrollments (admin)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Enrollment' }

  /enrollments/me:
    get:
      tags: [Enrollments]
      summary: Own enrollments
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Enrollment' }

  /enrollments/{id}:
    delete:
      tags: [Enrollments]
      summary: Unenroll (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: integer }
      responses:
        '204': { description: Unenrolled }

  # ── TRACKING ──────────────────────────────────────────────
  /tracking/action:
    post:
      tags: [Tracking]
      summary: Log a user action
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action_type]
              properties:
                action_type:
                  type: string
                  enum: [lesson_opened, lesson_completed, quiz_started, quiz_completed, day_completed, course_enrolled, course_completed, checkin_site, checkout_site, app_opened, app_backgrounded]
                course_id: { type: string }
                day_number: { type: integer }
                metadata: { type: object }
      responses:
        '201': { description: Logged }

  /tracking/actions:
    get:
      tags: [Tracking]
      summary: Get action history (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: query
          name: user_id
          schema: { type: integer }
        - in: query
          name: action_type
          schema: { type: string }
        - in: query
          name: from
          schema: { type: string, format: date }
        - in: query
          name: to
          schema: { type: string, format: date }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/UserAction' }

  /tracking/location/session/start:
    post:
      tags: [Tracking]
      summary: Start location tracking session
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                session_type: { type: string, enum: [flight, practice, ground] }
                site_name: { type: string }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationSession' }

  /tracking/location/session/end:
    post:
      tags: [Tracking]
      summary: End location tracking session
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id]
              properties:
                session_id: { type: integer }
                notes: { type: string }
      responses:
        '200': { description: Session ended }

  /tracking/location:
    post:
      tags: [Tracking]
      summary: Post GPS location point
      security: [{ bearerAuth: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, lat, lng]
              properties:
                session_id: { type: integer }
                lat: { type: number }
                lng: { type: number }
                altitude: { type: number }
                accuracy: { type: number }
                speed: { type: number }
                heading: { type: number }
                recorded_at: { type: string, format: date-time }
      responses:
        '201': { description: Point recorded }

  /tracking/location/live:
    get:
      tags: [Tracking]
      summary: Live view — all active sessions (admin/instructor)
      security: [{ bearerAuth: [] }]
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    session: { $ref: '#/components/schemas/LocationSession' }
                    user: { $ref: '#/components/schemas/User' }
                    latest_point: { $ref: '#/components/schemas/LocationPoint' }

  /tracking/location/{userId}:
    get:
      tags: [Tracking]
      summary: Latest location for user (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: userId
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/LocationPoint' }

  /tracking/location/session/{sessionId}:
    get:
      tags: [Tracking]
      summary: Full location trail for session
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: sessionId
          required: true
          schema: { type: integer }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/LocationPoint' }

  # ── PRODUCTS ──────────────────────────────────────────────
  /products:
    get:
      tags: [Products]
      summary: List products
      parameters:
        - in: query
          name: category
          schema: { type: string }
        - in: query
          name: subcategory
          schema: { type: string }
        - in: query
          name: search
          schema: { type: string }
        - in: query
          name: page
          schema: { type: integer, default: 1 }
        - in: query
          name: limit
          schema: { type: integer, default: 20 }
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items: { $ref: '#/components/schemas/Product' }
    post:
      tags: [Products]
      summary: Create product (admin)
      security: [{ bearerAuth: [] }]
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }

  /products/categories:
    get:
      tags: [Products]
      summary: List categories
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    category: { type: string }
                    subcategory: { type: string }

  /products/{id}:
    get:
      tags: [Products]
      summary: Get product detail
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
    put:
      tags: [Products]
      summary: Update product (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '200':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Product' }
    delete:
      tags: [Products]
      summary: Deactivate product (admin)
      security: [{ bearerAuth: [] }]
      parameters:
        - in: path
          name: id
          required: true
          schema: { type: string }
      responses:
        '204': { description: Deactivated }
